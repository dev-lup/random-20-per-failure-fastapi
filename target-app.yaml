apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim-app
  labels:
    app: victim-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victim-app
  template:
    metadata:
      labels:
        app: victim-app
    spec:
      containers:
      - name: victim-app
        image: victim-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          limits:
            memory: "128Mi"
          requests:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: victim-app-service
spec:
  type: NodePort
  selector:
    app: victim-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30001
